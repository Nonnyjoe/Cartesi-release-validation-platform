name: Release Validation

on:
  repository_dispatch:
    types: [cartesi-release]
  workflow_dispatch:
    inputs:
      node_version:
        description: "Cartesi node version to validate"
        required: true
        default: "latest"

jobs:
  validate-release:
    name: Run full validation suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start RVP platform
        run: |
          cp .env.example .env
          echo "NODE_VERSION=${{ github.event.inputs.node_version || github.event.client_payload.node_version }}" >> .env
          docker compose up -d postgres rabbitmq redis
          sleep 10  # wait for infra
          docker compose up -d orchestrator sandbox-manager test-runner

      - name: Wait for orchestrator ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/healthz && break
            echo "Waiting for orchestrator… ($i/30)"
            sleep 5
          done

      - name: Trigger validation run
        id: trigger
        run: |
          RUN=$(curl -sf -X POST http://localhost:8000/runs \
            -H "Content-Type: application/json" \
            -d '{"node_version":"${{ github.event.inputs.node_version || github.event.client_payload.node_version }}","triggered_by":"ci"}')
          echo "run_id=$(echo $RUN | jq -r .run_id)" >> $GITHUB_OUTPUT
          echo "Triggered run: $(echo $RUN | jq -r .run_id)"

      - name: Poll for run completion
        run: |
          RUN_ID=${{ steps.trigger.outputs.run_id }}
          for i in {1..60}; do
            STATUS=$(curl -sf http://localhost:8000/runs/$RUN_ID | jq -r .status)
            echo "[$i/60] status=$STATUS"
            if [[ "$STATUS" == "completed" || "$STATUS" == "failed" ]]; then
              break
            fi
            sleep 15
          done

      - name: Collect results
        id: results
        run: |
          RUN_ID=${{ steps.trigger.outputs.run_id }}
          RUN=$(curl -sf http://localhost:8000/runs/$RUN_ID)
          echo "pass_rate=$(echo $RUN | jq -r .pass_rate)" >> $GITHUB_OUTPUT
          echo "status=$(echo $RUN | jq -r .status)" >> $GITHUB_OUTPUT
          echo "$RUN" | jq .

      - name: Post results as GitHub release comment
        if: github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const pass_rate = '${{ steps.results.outputs.pass_rate }}';
            const status = '${{ steps.results.outputs.status }}';
            const run_id = '${{ steps.trigger.outputs.run_id }}';
            const emoji = status === 'completed' && parseFloat(pass_rate) >= 90 ? '✅' : '❌';
            const body = `## ${emoji} RVP Validation — ${status}\n\n**Pass Rate:** ${pass_rate}%\n**Run ID:** \`${run_id}\`\n\n[View full report](http://localhost:3000/runs/${run_id})`;
            // Post as a commit comment (release tagging requires release ID)
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });

      - name: Fail if pass rate below threshold
        run: |
          PASS=${{ steps.results.outputs.pass_rate }}
          if (( $(echo "$PASS < 80" | bc -l) )); then
            echo "Pass rate $PASS% is below 80% threshold"
            exit 1
          fi

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs --no-color > /tmp/rvp-logs.txt 2>&1

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rvp-logs
          path: /tmp/rvp-logs.txt
