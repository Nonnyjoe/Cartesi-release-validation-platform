name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Type-check + Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          pip install ruff mypy pytest pytest-asyncio \
            aio-pika httpx pydantic pydantic-settings \
            fastapi uvicorn sqlalchemy asyncpg anthropic \
            docker pyyaml

      - name: Ruff lint
        run: ruff check services/ shared/

      - name: Mypy type-check
        run: mypy services/ shared/ --ignore-missing-imports --no-error-summary
        continue-on-error: true  # non-blocking until stubs are complete

      - name: Unit tests
        run: pytest tests/unit/ -v --tb=short

  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/orchestrator/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push ai-agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/ai-agent/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/ai-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v5
        with:
          context: services/dashboard
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
