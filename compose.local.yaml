name: cartesi-rollups-node
x-env: &env
  CARTESI_LOG_LEVEL: info
  CARTESI_AUTH_KIND: ${AUTH_KIND}
  CARTESI_BLOCKCHAIN_ID: ${BLOCKCHAIN_ID}
  CARTESI_AUTH_PRIVATE_KEY: ${CARTESI_AUTH_PRIVATE_KEY}
  CARTESI_BLOCKCHAIN_WS_ENDPOINT: ${BLOCKCHAIN_WS_ENDPOINT}
  CARTESI_BLOCKCHAIN_HTTP_ENDPOINT: ${BLOCKCHAIN_HTTP_ENDPOINT}
  CARTESI_SNAPSHOTS_DIR: "/var/lib/cartesi-rollups-node/snapshot"
  CARTESI_CONTRACTS_INPUT_BOX_ADDRESS: 0x1b51e2992A2755Ba4D6F7094032DF91991a0Cfac
  CARTESI_CONTRACTS_AUTHORITY_FACTORY_ADDRESS: 0x5E96408CFE423b01dADeD3bc867E6013135990cc
  CARTESI_CONTRACTS_APPLICATION_FACTORY_ADDRESS: 0x26E758238CB6eC5aB70ce0dd52aF2d7b82e1972E
  CARTESI_CONTRACTS_SELF_HOSTED_APPLICATION_FACTORY_ADDRESS: 0x010D3CbB4223F5bCc7b7B03cEE59f3aAea8eDb8A
  CARTESI_DATABASE_CONNECTION: postgres://postgres:password@database:5432/rollupsdb?sslmode=disable
  CARTESI_EPOCH_LENGTH: 1
  CARTESI_BLOCKCHAIN_DEFAULT_BLOCK: "latest"

services:
  database:
    container_name: database
    image: cartesi/rollups-database:${SDK_VERSION}
    environment:
      POSTGRES_PASSWORD: password
    networks:
      - default
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres || exit 1
      timeout: 1s
      interval: 10s
      retries: 5
      start_period: 10s
      start_interval: 200ms

  evm-reader:
    container_name: evm-reader
    image: cartesi/rollups-runtime:${SDK_VERSION}
    command: cartesi-rollups-evm-reader --default-block latest
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
    ports:
      - "10001:10001"
    environment:
      <<: *env

  advancer:
    container_name: advancer
    image: cartesi/rollups-runtime:${SDK_VERSION}
    command: cartesi-rollups-advancer
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - data:/var/lib/cartesi-rollups-node/data
      - .cartesi/image:/var/lib/cartesi-rollups-node/snapshot/
    networks:
      - default
    ports:
      - "10002:10002"
      - "10012:10012"
    environment:
      <<: *env

  validator:
    container_name: validator
    image: cartesi/rollups-runtime:${SDK_VERSION}
    command: cartesi-rollups-validator
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
    ports:
      - "10003:10003"
    environment:
      <<: *env

  claimer:
    container_name: claimer
    image: cartesi/rollups-runtime:${SDK_VERSION}
    command: cartesi-rollups-claimer
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
    ports:
      - "10004:10004"
    environment:
      <<: *env

  jsonrpc-api:
    container_name: jsonrpc-api
    image: cartesi/rollups-runtime:${SDK_VERSION}
    command: cartesi-rollups-jsonrpc-api
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
    ports:
      - "10005:10005"
      - "10011:10011"
    environment:
      <<: *env

volumes:
  data:
